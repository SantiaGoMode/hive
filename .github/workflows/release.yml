# Desktop release: push a tag `vX.Y.Z` (matching the root package.json version)
# and the supported macOS/Linux platforms build + upload their installers.
#
# macOS fails closed unless Developer ID signing and notarization credentials
# are present. Windows packaging remains available locally but is not part of
# this release workflow until Authenticode credentials are configured.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            desktop/package-lock.json
      - run: npm ci
      - run: npm ci --prefix client
      - run: npm ci --prefix desktop
      - run: npm run test:ci
      - run: npm audit --audit-level=high
      - run: npm audit --audit-level=high --prefix client
      - run: npm audit --audit-level=high --prefix desktop
      - name: Generate dependency SBOMs
        run: |
          npm sbom --sbom-format cyclonedx > hive-server-sbom.cdx.json
          npm sbom --sbom-format cyclonedx --prefix client > hive-client-sbom.cdx.json
          npm sbom --sbom-format cyclonedx --prefix desktop > hive-desktop-sbom.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: hive-sbom
          path: '*-sbom.cdx.json'

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            desktop/package-lock.json

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix client
          npm ci --prefix desktop

      - name: Build client for desktop staging
        run: npm run build

      - name: Require macOS production signing credentials
        if: runner.os == 'macOS'
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$MAC_CSC_LINK"
          test -n "$MAC_CSC_KEY_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID"

      - name: Build signed and notarized macOS artifacts
        if: runner.os == 'macOS'
        run: npm run dist:ci --prefix desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify packaged macOS signatures and notarization
        if: runner.os == 'macOS'
        run: node desktop/scripts/verify-macos-artifacts.js desktop/dist

      - name: Build Linux artifacts
        if: runner.os == 'Linux'
        run: npm run dist:ci --prefix desktop

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: hive-${{ runner.os }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/*.blockmap
            desktop/dist/latest*.yml
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Generate checksums
        working-directory: release-artifacts
        run: sha256sum * > SHA256SUMS.txt
      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: 'release-artifacts/*'
      - name: Publish immutable release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" release-artifacts/* --verify-tag --generate-notes
